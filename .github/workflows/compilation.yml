# ps2-http CI: builds all three backend variants (ee / iop / both) inside
# the ps2dev/ps2dev:latest umbrella image (toolchain + ps2sdk + ports) and
# uploads them as a single artifact bundle alongside the example config.

name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup dependencies
      run: |
        apk update
        apk add cmake gmp mpc1 mpfr4 make git

    - name: Configure with CMake
      run: cmake -S . -B build

    - name: Build all variants
      run: cmake --build build -j $(getconf _NPROCESSORS_ONLN)

    - name: Stage artifact bundle
      run: |
        mkdir -p artifact
        cp build/ps2-http-ee.elf  artifact/
        cp build/ps2-http-iop.elf artifact/
        cp build/ps2-http.elf     artifact/
        cp ps2_http.cfg.example   artifact/

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: ps2-http-${{ steps.slug.outputs.sha8 }}
        path: artifact/*
