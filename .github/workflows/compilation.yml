# ps2-http CI: builds all three backend variants (ee / iop / both) inside
# the ps2dev/ps2sdk:latest container and uploads them as a single artifact
# bundle alongside the example config. The artifact verifies compilation;
# functional behaviour additionally depends on the host ps2sdk having the
# lwIP 2.2.1 fixes for EE/IOP networking that this project tracks.

name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]
  workflow_dispatch: {}

jobs:
  ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2sdk:latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup dependencies
      run: |
        apk update
        apk add cmake gmp mpc1 mpfr4 make git

    # ps2_http depends on ps2_drivers, which is not part of the ps2dev
    # container. Clone and install it before building.
    - name: Build & install ps2_drivers
      run: |
        git clone --depth=1 https://github.com/fjtrujy/ps2_drivers.git /tmp/ps2_drivers
        cmake -S /tmp/ps2_drivers -B /tmp/ps2_drivers/build
        cmake --build /tmp/ps2_drivers/build -j $(getconf _NPROCESSORS_ONLN)
        cmake --install /tmp/ps2_drivers/build

    - name: Configure with CMake
      run: cmake -S . -B build

    - name: Build all variants
      run: cmake --build build -j $(getconf _NPROCESSORS_ONLN)

    - name: Stage artifact bundle
      run: |
        mkdir -p artifact
        cp build/ps2-http-ee.elf  artifact/
        cp build/ps2-http-iop.elf artifact/
        cp build/ps2-http.elf     artifact/
        cp ps2_http.cfg.example   artifact/

    - name: Get short SHA
      id: slug
      run: echo "sha8=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      if: ${{ success() }}
      uses: actions/upload-artifact@v4
      with:
        name: ps2-http-${{ steps.slug.outputs.sha8 }}
        path: artifact/*
